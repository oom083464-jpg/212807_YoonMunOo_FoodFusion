services:
  web:
    build: .
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    networks:
      - apip_hub_network
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: foodfusion_db
    ports:
      - "3306:3306"
    networks:
      - apip_hub_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: summer_26_bewd_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: password
      PMA_ARBITRARY: 1
    ports:
      - "8912:80"
    depends_on:
      - db
    networks:
      - apip_hub_network

networks:
  apip_hub_network:
    driver: bridge